name: Registry Monitor

# Runs the scraper on a schedule and whenever triggered manually.
on:
  schedule:
    # Every 48 hours. Cron runs in UTC. This fires at 06:00 UTC on
    # odd-numbered days of the month (1,3,5...). Close enough to "every
    # 2 days" for our purposes without needing exact 48h spacing.
    - cron: "0 6 1-31/2 * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

# Allow the workflow to commit the updated database + dashboard back to the repo
permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run the monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python run.py

      - name: Commit updated database and dashboard
        run: |
          git config user.name "registry-monitor-bot"
          git config user.email "actions@github.com"
          git add monitor.db dashboard.html alerts.log
          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated run: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi